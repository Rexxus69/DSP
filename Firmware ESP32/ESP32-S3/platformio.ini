; ══════════════════════════════════════════════════════════════════════════════
; DSP Controller v4.2 — platformio.ini
; Waveshare ESP32-S3-LCD-3.16 (ESP32-S3R8, 16MB Flash, 8MB OPI PSRAM)
; ══════════════════════════════════════════════════════════════════════════════

[platformio]
default_envs = hardware

; ── Impostazioni comuni (senza CORE_DEBUG_LEVEL — definito per env) ───────────
[common]
platform   = espressif32 @ ^6.9.0
board      = esp32s3box
framework  = arduino

build_flags_common =
    -DASYNC_TCP_SSL_ENABLED=0
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_CONF_PATH=lv_conf.h
    -I src

lib_deps_common =
    esphome/AsyncTCP-esphome @ ^2.1.3
    esphome/ESPAsyncWebServer-esphome @ ^3.1.0
    lvgl/lvgl @ ^8.3.11
    bblanchon/ArduinoJson @ ^7.0.0

; ── AMBIENTE SIMULATORE (Wokwi) ───────────────────────────────────────────────
[env:esp32-s3-lcd-316]
platform   = ${common.platform}
board      = ${common.board}
framework  = ${common.framework}

board_build.flash_size   = 16MB
board_build.flash_mode   = qio
board_build.filesystem   = littlefs

build_flags =
    ${common.build_flags_common}
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DWOKWI_SIM

upload_protocol  = esptool
monitor_speed    = 115200
monitor_dtr      = 0
monitor_rts      = 0
monitor_filters  = esp32_exception_decoder
lib_deps = ${common.lib_deps_common}

; ── AMBIENTE HARDWARE (scheda fisica) ─────────────────────────────────────────
[env:hardware]
platform   = ${common.platform}
board      = ${common.board}
framework  = ${common.framework}

board_build.flash_size              = 16MB
board_build.flash_mode              = qio
board_build.partitions              = partitions_16MB.csv
board_build.psram_type              = opi
board_build.arduino.memory_type     = qio_opi
board_build.filesystem              = littlefs

build_flags =
    ${common.build_flags_common}
    -DCORE_DEBUG_LEVEL=0            ; silenzia spam Wire/I2C (Serial.println non è influenzato)
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

upload_protocol  = esptool
upload_port      = COM9
upload_speed     = 921600
monitor_port     = COM9
monitor_speed    = 115200
monitor_dtr      = 0
monitor_rts      = 0
monitor_filters  = esp32_exception_decoder
lib_deps = ${common.lib_deps_common}
